<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <!-- Browser chrome -->
  <rect width="1200" height="700" fill="#0a0a0b" rx="12"/>
  <rect width="1200" height="44" fill="#1c1c1e" rx="12"/>
  <rect y="32" width="1200" height="12" fill="#1c1c1e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="400" height="24" rx="12" fill="#2a2a2e"/>
  <text x="400" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle">localhost:3000/login</text>

  <!-- Background gradient -->
  <rect x="0" y="44" width="1200" height="656" fill="#0a0a0b"/>

  <!-- Login card centered -->
  <rect x="380" y="110" width="440" height="520" rx="16" fill="#1a1a1e" stroke="#27272a" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="600" cy="170" r="28" fill="#3b82f6"/>
  <text x="600" y="178" font-family="system-ui,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">O</text>

  <text x="600" y="220" font-family="system-ui,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">Welcome back</text>
  <text x="600" y="242" font-family="system-ui,sans-serif" font-size="13" fill="#71717a" text-anchor="middle">Sign in to your OpsBoard account</text>

  <!-- Email field -->
  <text x="412" y="282" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa" font-weight="500">Email</text>
  <rect x="410" y="290" width="380" height="42" rx="8" fill="#0a0a0b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="316" font-family="system-ui,sans-serif" font-size="13" fill="#e4e4e7">admin@opsboard.io</text>

  <!-- Password field -->
  <text x="412" y="356" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa" font-weight="500">Password</text>
  <rect x="410" y="364" width="380" height="42" rx="8" fill="#0a0a0b" stroke="#27272a" stroke-width="1"/>
  <text x="430" y="390" font-family="system-ui,sans-serif" font-size="13" fill="#52525b">••••••••••</text>

  <!-- Remember me + Forgot -->
  <rect x="410" y="420" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="432" y="432" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa">Remember me</text>
  <text x="790" y="432" font-family="system-ui,sans-serif" font-size="12" fill="#3b82f6" text-anchor="end">Forgot password?</text>

  <!-- Sign in button -->
  <rect x="410" y="456" width="380" height="42" rx="8" fill="#3b82f6"/>
  <text x="600" y="482" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">Sign in</text>

  <!-- Divider -->
  <line x1="410" y1="520" x2="570" y2="520" stroke="#27272a" stroke-width="1"/>
  <text x="600" y="524" font-family="system-ui,sans-serif" font-size="11" fill="#52525b" text-anchor="middle">or</text>
  <line x1="630" y1="520" x2="790" y2="520" stroke="#27272a" stroke-width="1"/>

  <!-- GitHub OAuth -->
  <rect x="410" y="540" width="380" height="42" rx="8" fill="#0a0a0b" stroke="#27272a" stroke-width="1"/>
  <text x="600" y="566" font-family="system-ui,sans-serif" font-size="13" fill="#e4e4e7" text-anchor="middle">Continue with GitHub</text>

  <!-- Sign up link -->
  <text x="600" y="610" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Don't have an account? <tspan fill="#3b82f6">Sign up</tspan></text>
</svg>